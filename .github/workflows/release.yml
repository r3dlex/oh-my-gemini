name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish package to npm (requires NPM_TOKEN)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  pre_release_blocking:
    name: Pre-release blocking gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Legacy bypass policy gate
        run: npm run gate:legacy-bypass

      - name: Global install contract gate (C0)
        run: npm run gate:global-install-contract

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Reliability tests
        run: npm run test:reliability

      - name: Verification framework contracts
        run: npm run test:verification

      - name: Verify command baseline
        run: npm run verify -- --tier thorough --json

      - name: Verify tier smoke (light dry-run)
        run: npm run verify -- --tier light --dry-run --json

  check_version:
    name: Check version against npm
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare local vs published version
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view oh-my-gemini-sisyphus version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL | npm: $NPM"
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - pre_release_blocking
      - check_version
    if: >
      (github.event_name == 'push' && needs.check_version.outputs.should_publish == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
