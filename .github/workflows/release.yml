name: release

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish package to npm (requires NPM_TOKEN)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  check_version:
    name: Check version against npm
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare local vs published version
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view oh-my-gemini-sisyphus version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL | npm: $NPM"
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: check_version
    if: >
      (github.event_name == 'workflow_run' && needs.check_version.outputs.should_publish == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
