name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Compute next version from npm
        id: version
        run: |
          NPM=$(npm view oh-my-product version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor patch <<< "$NPM"
          NEXT="$major.$minor.$((patch + 1))"
          echo "npm=$NPM next=$NEXT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump version locally (no commit)
        run: |
          npm version "${{ steps.version.outputs.next }}" --no-git-tag-version
          bash scripts/sync-extension-version.sh

      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.next }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
