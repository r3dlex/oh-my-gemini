name: release

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish package to npm (requires NPM_TOKEN)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  bump_or_publish:
    name: Auto bump or publish
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Compare versions
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view oh-my-gemini-sisyphus version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL | npm: $NPM"

          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"

            IFS='.' read -r major minor patch <<< "$NPM"
            NEW_VERSION="$major.$minor.$((patch + 1))"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      # --- Bump path: create PR ---
      - name: Check for existing bump PR
        if: steps.check.outputs.needs_bump == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list --head "release/auto-bump" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Bump PR #$EXISTING already exists, closing stale PR"
            gh pr close "$EXISTING" --delete-branch || true
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Create bump branch and PR
        if: steps.check.outputs.needs_bump == 'true' && steps.existing.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "release/auto-bump"

          npm version "$NEW_VERSION" --no-git-tag-version
          bash scripts/sync-extension-version.sh

          git add package.json package-lock.json gemini-extension.json
          git commit -m "release: bump version to $NEW_VERSION"
          git push -u origin "release/auto-bump" --force

          gh pr create \
            --title "release: bump version to $NEW_VERSION" \
            --body "Automated patch version bump: \`$NEW_VERSION\`" \
            --head "release/auto-bump" \
            --base main

          gh pr merge --auto --squash --delete-branch

      # --- Publish path: version already ahead ---
      - name: Validate npm token
        if: >
          steps.check.outputs.should_publish == 'true' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

      - name: Publish package
        if: >
          steps.check.outputs.should_publish == 'true' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
