name: release

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Read release version from package metadata
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view oh-my-gemini version 2>/dev/null || echo "0.0.0")
          echo "package=$VERSION published=$PUBLISHED"
          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "::error::package.json version $VERSION is already published. Bump the release version before publishing."
            exit 1
          fi
          echo "next=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync extension manifests
        run: |
          bash scripts/sync-extension-version.sh

      - name: Release gate
        run: npm run gate:publish

      - name: Validate npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.next }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
