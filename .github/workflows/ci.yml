name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Legacy bypass policy gate
        run: npm run gate:legacy-bypass

  global_install_contract:
    name: Global Install Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Global install contract gate
        run: npm run gate:global-install-contract

  test:
    name: Test (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run test:smoke -- --coverage

      - name: Integration tests
        run: npm run test:integration -- --coverage

      - name: Reliability tests
        run: npm run test:reliability -- --coverage

      - name: Verification framework contracts
        run: npm run test:verification -- --coverage

      - name: Verify command baseline
        run: npm run verify -- --tier thorough --json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated
        continue-on-error: true

  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|ci|security)(\([a-zA-Z0-9_,-]+\))?: .+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "PR title does not follow conventional commits format"
            echo "Expected: type: description or type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, test, chore, ci, security"
            exit 1
          fi
          echo "PR title format is correct"

      - name: Check PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "$PR_BODY" ]] || [[ "$PR_BODY" == "null" ]]; then
            echo "PR description is empty (recommended but not required)"
          else
            echo "PR description present"
          fi
