name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint and Type Check (fast feedback)
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Legacy bypass policy gate
        run: npm run gate:legacy-bypass

  # Job 2: Global Install Contract (critical for npm publish)
  global_install_contract:
    name: Global Install Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Global install contract gate
        run: npm run gate:global-install-contract

  # Job 3: Test Matrix (Node 20, 22)
  test-matrix:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Legacy bypass policy gate
        run: npm run gate:legacy-bypass

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Reliability tests
        run: npm run test:reliability

      - name: Verification framework contracts
        run: npm run test:verification

      - name: Verify command baseline
        run: npm run verify -- --tier thorough --json

      - name: Verify tier smoke (light dry-run)
        run: npm run verify -- --tier light --dry-run --json

      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: dist-node${{ matrix.node-version }}
          path: dist/
          retention-days: 7

  # Job 4: OpenClaw E2E Smoke
  openclaw-e2e-smoke:
    name: OpenClaw E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run OpenClaw E2E smoke
        run: node --import tsx scripts/openclaw-e2e-smoke.ts

  # Job 5: Security & Dependency Review
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated
        continue-on-error: true

  # Job 6: Optional Signals (non-blocking)
  optional-signals:
    name: Optional Signals
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [global_install_contract, test-matrix]
    if: always()
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Setup idempotency smoke
        id: setup_smoke
        continue-on-error: true
        run: bash scripts/smoke-install.sh

      - name: Sandbox dry-run smoke
        id: sandbox_smoke
        continue-on-error: true
        run: bash scripts/sandbox-smoke.sh --dry-run

      - name: Team lifecycle integration script
        id: team_lifecycle
        continue-on-error: true
        run: bash scripts/integration-team-run.sh "ci-smoke"

      - name: Docker clean-room smoke
        id: docker_smoke
        continue-on-error: true
        timeout-minutes: 12
        run: npm run test:docker

      - name: Docker full Gemini live smoke (key-auth)
        id: docker_full_smoke
        if: ${{ env.GEMINI_API_KEY != '' }}
        continue-on-error: true
        timeout-minutes: 16
        run: npm run test:docker:full

      - name: Optional signal summary
        if: always()
        run: |
          {
            echo "### Optional signal summary"
            echo ""
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| setup idempotency smoke | ${{ steps.setup_smoke.outcome }} |"
            echo "| sandbox dry-run smoke | ${{ steps.sandbox_smoke.outcome }} |"
            echo "| team lifecycle integration | ${{ steps.team_lifecycle.outcome }} |"
            echo "| docker clean-room smoke | ${{ steps.docker_smoke.outcome }} |"
            echo "| docker full gemini live smoke | ${{ steps.docker_full_smoke.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # Job 7: PR Validation
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|ci|security)(\([a-zA-Z0-9_,-]+\))?: .+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "❌ PR title does not follow conventional commits format"
            echo "Expected: type: description or type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, test, chore, ci, security"
            exit 1
          fi
          echo "✅ PR title format is correct"

      - name: Check PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -z "$PR_BODY" ]] || [[ "$PR_BODY" == "null" ]]; then
            echo "⚠️ PR description is empty (recommended but not required)"
          else
            echo "✅ PR description present"
          fi
