name: ci

on:
  push:
  pull_request:

jobs:
  consumer_contract_blocking:
    name: Consumer Contract (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Global install contract gate
        run: npm run gate:global-install-contract

  quality_blocking:
    name: Quality (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - consumer_contract_blocking

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke tests
        run: npm run test:smoke

      - name: Integration tests
        run: npm run test:integration

      - name: Reliability tests
        run: npm run test:reliability

      - name: Verify command baseline
        run: npm run verify -- --json

  signal_non_blocking:
    name: Optional Signals (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality_blocking
    if: always()
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Setup idempotency smoke
        id: setup_smoke
        continue-on-error: true
        run: bash scripts/smoke-install.sh

      - name: Sandbox dry-run smoke
        id: sandbox_smoke
        continue-on-error: true
        run: bash scripts/sandbox-smoke.sh --dry-run

      - name: Team lifecycle integration script
        id: team_lifecycle
        continue-on-error: true
        run: bash scripts/integration-team-run.sh "ci-smoke"

      - name: Docker clean-room smoke
        id: docker_smoke
        continue-on-error: true
        timeout-minutes: 12
        run: npm run test:docker

      - name: Docker full Gemini live smoke (key-auth)
        id: docker_full_smoke
        if: ${{ env.GEMINI_API_KEY != '' }}
        continue-on-error: true
        timeout-minutes: 16
        run: npm run test:docker:full

      - name: Optional signal summary
        if: always()
        run: |
          {
            echo "### Optional signal summary"
            echo ""
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| setup idempotency smoke | ${{ steps.setup_smoke.outcome }} |"
            echo "| sandbox dry-run smoke | ${{ steps.sandbox_smoke.outcome }} |"
            echo "| team lifecycle integration | ${{ steps.team_lifecycle.outcome }} |"
            echo "| docker clean-room smoke | ${{ steps.docker_smoke.outcome }} |"
            echo "| docker full gemini live smoke | ${{ steps.docker_full_smoke.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
