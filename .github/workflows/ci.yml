name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Temporary early-stage policy:
      # keep compile/build as hard gates, but treat downstream checks as
      # best-effort signals while product contracts are still evolving.
      - name: Setup idempotency smoke
        continue-on-error: true
        run: bash scripts/smoke-install.sh

      - name: Sandbox dry-run smoke
        continue-on-error: true
        run: bash scripts/sandbox-smoke.sh --dry-run

      - name: Smoke tests
        continue-on-error: true
        run: npm run test:smoke

      - name: Integration tests
        continue-on-error: true
        run: npm run test:integration

      - name: Reliability tests
        continue-on-error: true
        run: npm run test:reliability

      - name: Verify command baseline
        continue-on-error: true
        run: npm run verify -- --json

      - name: Team lifecycle integration script (non-blocking signal)
        continue-on-error: true
        run: bash scripts/integration-team-run.sh "ci-smoke"
