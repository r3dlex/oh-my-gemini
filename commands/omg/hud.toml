description = "Render the oh-my-gemini HUD status overlay with progress indicators."
prompt = """
Render omg HUD status overlay.

If args are provided:
  oh-my-gemini hud {{args}}
  # alias: omg hud {{args}}
Else:
  oh-my-gemini hud --preset focused

Examples:
  oh-my-gemini hud --team oh-my-gemini --preset minimal
  oh-my-gemini hud --watch --interval-ms 1000
  oh-my-gemini hud --team oh-my-gemini --json

Report:
1) preset/team used,
2) status overlay output,
3) progress indicators (tasks/workers),
4) Gemini API metadata summary (model/api source/quota if available).
"""
