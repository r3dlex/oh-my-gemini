description = "Run an exec‚Üíverify‚Üífix cycle until the goal is met or max iterations reached."
prompt = """
Execute an iterative loop for oh-my-gemini task completion.

Usage:
- `/omg:loop "make all tests pass"` ‚Äî run until goal met
- `/omg:loop --max 3 "fix lint errors"` ‚Äî cap iterations
- `/omg:loop --dry` ‚Äî show what would run without executing

{{args}}

Cycle:
1. **Exec**: Run the task (executor agent or shell command)
2. **Verify**: Check success criteria (verifier agent or exit code)
3. **Fix**: If failed, diagnose and apply correction
4. **Repeat**: Go back to step 1

Exit conditions:
- Goal met ‚Üí report success with iteration count
- Max iterations reached (default: 5) ‚Üí report diagnosis
- Same failure 3x ‚Üí early exit with root cause analysis
- User cancellation ‚Üí preserve progress

Track state in `.omg/state/loop.json`:
  { "goal": "...", "iteration": 1, "max": 5, "failures": [] }

Output progress each iteration:
  [Loop 1/5] Executing... ‚Üí [Loop 1/5] Verifying... ‚Üí [Loop 1/5] FAILED ‚Üí fixing...
"""
