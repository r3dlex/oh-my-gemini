description = "Converge multiple design options into a single decision through structured scoring."
prompt = """
Run oh-my-gemini consensus protocol for multi-option decision making.

{{args}}

If no args: show usage.
If args provided: treat as the decision question to resolve.

Process:
1. **Generate**: Produce 2-4 distinct options/approaches
2. **Score**: Evaluate each option on predefined criteria
3. **Debate**: Surface trade-offs and edge cases
4. **Converge**: Select the highest-scoring option with rationale

Scoring criteria (weighted):
- Correctness (30%): Does it solve the problem?
- Simplicity (25%): Minimal complexity and moving parts
- Risk (20%): What could go wrong?
- Maintainability (15%): Future cost of ownership
- Performance (10%): Speed and resource efficiency

Output format:
| Option | Correctness | Simplicity | Risk | Maintain | Perf | Total |
|--------|-------------|------------|------|----------|------|-------|

Decision: [selected option] with confidence level (high/medium/low).

Persist decision record to `.omg/state/decisions/` for audit trail.
"""
