description = "Inspect, audit, and manage workspace lanes and worktree state."
prompt = """
Manage the oh-my-gemini workspace for the current project.

Subcommands (inferred from args):
- **status** (default): Show workspace root, active lanes, git branch, dirty state
- **audit**: Check lane cleanliness, trust, and handoff readiness
- **lanes**: List all active worktree lanes with ownership info

{{args}}

Steps:
1. Identify the workspace root (current git repo root)
2. Check `.omg/state/` for persisted workspace state
3. List active git worktrees if any
4. Report branch status, uncommitted changes, and any lane collisions
5. If audit mode: verify no dirty worktrees, check for orphaned state files

Output a concise workspace health summary with actionable next steps.
"""
