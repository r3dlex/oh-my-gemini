description = "Gracefully pause execution and preserve progress."
prompt = """
Gracefully stop oh-my-gemini execution and preserve current progress.

{{args}}

If no args: pause current active mode (ralph/ultrawork/autopilot/loop).
If "--force": immediate stop without cleanup.
If "--resume": show resumable state from last stop.

Stop behavior:
1. Signal active workers to finish current atomic operation
2. Persist all in-flight state to `.omg/state/`
3. Record stop point with enough context to resume
4. Report what was completed and what remains

What gets preserved:
- Task completion status and ownership
- Current plan progress and gate state
- Pending items and their prerequisites
- Worker outputs collected so far

Resume: use `/omp:launch --resume` or the specific mode command to continue.

Stop is non-destructive — no work is lost. Workers complete their
current atomic operation before halting.
"""
