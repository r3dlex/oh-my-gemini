description = "List/register oh-my-product built-in MCP tools (file/git/http/process)."
prompt = """
Manage oh-my-product built-in CLI MCP tools.

Actions:
1. Inspect available tools:
   - oh-my-product tools list --json
   - alias: omp tools list --json
2. Produce Gemini extension mcpServers registration payload:
   - oh-my-product tools manifest --json
   - alias: omp tools manifest --json
3. If user asks for selective categories, pass `--categories file,git,http,process` subset.
4. Report:
   - command(s) executed,
   - selected categories,
   - generated `mcpServers` snippet for Gemini settings/extension manifest.
"""
