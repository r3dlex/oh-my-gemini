description = "Toggle approval posture for orchestrated team execution."
prompt = """
Set or display the approval posture for oh-my-product team orchestration.

Modes:
- **suggest** (default): Director proposes roster/plan, waits for user approval before execution
- **auto**: Auto-approve after safety checks pass; pause only on risk signals
- **full-auto**: Fully autonomous operation with periodic checkpoints

{{args}}

If no mode specified, display the current approval posture from `.omp/state/approval.json`.
If a mode is specified, persist it and confirm the change.

Safety: full-auto mode requires explicit user confirmation before activation.
"""
