description = "Run oh-my-product team orchestration (plan -> exec -> verify -> fix -> completed|failed)."
prompt = """
You are executing the oh-my-product team orchestration flow.

User task input:
{{args}}

Actions:
1. Validate prerequisites quickly (workspace, dependencies, sandbox assumptions).
2. Run the orchestration command using the installed CLI:
   - If args exist: oh-my-product team run --task "{{args}}"
   - If args are empty: oh-my-product team run --task "smoke"
   - Alias command: omp team run ...
   - Contributor fallback from repository root: npm run omp -- team run ...
   - Respect worker-count contract (`--workers 1..8`, default 3).
   - For subagent assignment, support explicit flags (`--backend subagents --subagents ...`) or leading task tags (`$planner /executor ...`).
   - Reject subagent assignment on tmux backend and reject subagent/worker count mismatch.
3. Report:
   - command executed,
   - exit code,
   - resolved backend/worker/subagent selection,
   - where state/log artifacts were written (especially .omp/state).
4. If the command fails, provide a concise remediation checklist.
"""
