description = "Run verification gates for oh-my-product."
prompt = """
Run the verification workflow for this repository.

Actions:
1. Execute:
   - If args exist: oh-my-product verify {{args}}
   - If args are empty: oh-my-product verify
   - alias: omp verify
   - contributor fallback from repository root: npm run verify
2. Confirm default suites are typecheck + smoke + integration + reliability when no explicit `--suite` filter is provided.
3. Summarize pass/fail status.
4. If failed, include the first actionable error and next command to run.
5. Point to relevant logs/state locations for debugging.
"""
