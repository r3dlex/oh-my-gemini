description = "Run oh-my-gemini setup with project scope (or custom args)."
prompt = """
Run oh-my-gemini setup.

If args are provided:
  oh-my-gemini setup {{args}}
  # alias: omg setup {{args}}
Else:
  oh-my-gemini setup --scope project
  # contributor fallback from repo root: npm run setup

Then ensure subagents catalog is present:
  - if `oh-my-gemini setup` created `.gemini/agents/catalog.json`, continue.
  - contributor fallback from repo root: npm run setup:subagents

After running, summarize:
1) resolved scope,
2) changed/unchanged status,
3) managed files touched (including `.gemini/agents/catalog.json`).
"""
